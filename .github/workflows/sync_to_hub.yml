name: Sync to Hugging Face Hub

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push code to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "tam43621@gmail.com"
          git config --global user.name "Nguyen Thanh Tam"
          git push --force https://tam43621:$HF_TOKEN@huggingface.co/spaces/tam43621/its-hcm HEAD:main