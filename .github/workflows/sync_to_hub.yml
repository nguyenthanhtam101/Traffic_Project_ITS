name: Sync to Hugging Face Hub

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Deploy Clean Code to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Cho Robot quên đi toàn bộ lịch sử rác trong quá khứ
          rm -rf .git
          rm -rf temp/
          
          # 2. Tạo một cuốn sổ đăng ký hoàn toàn mới
          git init -b main
          git config user.email "tam43621@gmail.com"
          git config user.name "Nguyen Thanh Tam"
          
          # 3. Kích hoạt LFS đóng gói lại từ đầu
          git lfs install
          git lfs track "*.pt"
          git lfs track "*.onnx"
          git lfs track "*.mp4"
          git lfs track "*.csv"
          git lfs track "*.png"
          git lfs track "*.jpg"
          
          # 4. Gom toàn bộ code hiện tại
          git add .
          git commit -m "Deploy fresh code to Hugging Face"
          
          # 5. Gửi sang máy chủ Hugging Face
          git push --force https://tam43621:$HF_TOKEN@huggingface.co/spaces/tam43621/its-hcm main:main